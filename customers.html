<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customers – Smart Billing System</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="layout">

    
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">🛒</span>
        <span class="brand-name">SmartBill</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
        <a href="billing.html"   class="nav-link">🧾 Billing</a>
        <a href="inventory.html" class="nav-link">📦 Inventory</a>
        <a href="customers.html" class="nav-link active">👥 Customers</a>
        <a href="reports.html"   class="nav-link">📈 Reports</a>
        <a href="settings.html"  class="nav-link">⚙️ Settings</a>
      </nav>
      <button class="btn btn-danger btn-full logout-btn" onclick="logoutUser()">🚪 Logout</button>
    </aside>

    
    <main class="main-content">

      <div class="topbar">
        <div>
          <h2>👥 Customers</h2>
          <p>Add and manage your customer records</p>
        </div>
      </div>

      
      <div class="card form-card">
        <h3>➕ Add New Customer</h3>

        <div class="form-row">
          <div class="form-group">
            <label>Customer Name</label>
            <input type="text" id="custName" placeholder="e.g. Ramesh Kumar"/>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="custPhone" placeholder="e.g. 9876543210" maxlength="10"/>
          </div>
          <div class="form-group">
            <label>Email (Optional)</label>
            <input type="email" id="custEmail" placeholder="e.g. ramesh@email.com"/>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" onclick="addCustomer()">💾 Save Customer</button>
        </div>
      </div>

      
      <div class="section-title">All Customers (<span id="custCount">0</span>)</div>
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Added On</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="customersTableBody">
            <tr>
              <td colspan="6" class="empty-row">No customers yet. Add one above!</td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="script.js"></script>
  <script>
    loadCustomersPage();
  </script>

</body>
</html>
