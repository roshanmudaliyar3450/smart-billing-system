<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventory – Smart Billing System</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="layout">

    
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">🛒</span>
        <span class="brand-name">SmartBill</span>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-link">📊 Dashboard</a>
        <a href="billing.html"   class="nav-link">🧾 Billing</a>
        <a href="inventory.html" class="nav-link active">📦 Inventory</a>
        <a href="customers.html" class="nav-link">👥 Customers</a>
        <a href="reports.html"   class="nav-link">📈 Reports</a>
        <a href="settings.html"  class="nav-link">⚙️ Settings</a>
      </nav>
      <button class="btn btn-danger btn-full logout-btn" onclick="logoutUser()">🚪 Logout</button>
    </aside>

    
    <main class="main-content">

      <div class="topbar">
        <div>
          <h2>📦 Inventory</h2>
          <p>Add, edit, or delete your products</p>
        </div>
      </div>

      
      <div class="card form-card">
        <h3 id="formTitle">➕ Add New Product</h3>

        
        <input type="hidden" id="editProductId" value=""/>

        <div class="form-row">
          <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="productName" placeholder="e.g. Rice"/>
          </div>
          <div class="form-group">
            <label>Price (₹)</label>
            <input type="number" id="productPrice" placeholder="e.g. 60" min="0"/>
          </div>
          <div class="form-group">
            <label>Quantity in Stock</label>
            <input type="number" id="productQty" placeholder="e.g. 100" min="0"/>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn btn-primary" onclick="saveProduct()">💾 Save Product</button>
          <button class="btn btn-secondary" onclick="cancelEdit()">Cancel</button>
        </div>

      </div>

      
      <div class="section-title">All Products</div>
      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Product Name</th>
              <th>Price (₹)</th>
              <th>Stock</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="inventoryTableBody">
            <tr><td colspan="5" class="empty-row">No products yet. Add one above!</td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>

  <script src="script.js"></script>
  <script>
    loadInventoryPage();
  </script>
</body>
</html>
